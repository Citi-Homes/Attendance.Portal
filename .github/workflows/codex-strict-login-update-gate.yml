name: Apply strict login update gate

on:
  push:
    paths:
      - .github/workflows/codex-strict-login-update-gate.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch and verify shared.js
        run: |
          python -c "import base64; exec(base64.b64decode('').decode())"
          node --check shared.js
          grep -q 'function canShowAppUpdateNotice(expectedRoute)' shared.js
          grep -q 'initAppUpdateNotice("employee")' shared.js
          grep -q 'initAppUpdateNotice("admin")' shared.js
      - name: Commit patch
        run: |
          rm -f .github/workflows/codex-strict-login-update-gate.yml
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git add shared.js .github/workflows/codex-strict-login-update-gate.yml
          git commit -m "Show update notice only inside logged-in portal"
          git push
