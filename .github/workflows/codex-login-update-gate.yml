name: Apply login-only app update gate

on:
  push:
    paths:
      - .github/workflows/codex-login-update-gate.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch shared.js
        run: |
          python -c "import base64; exec(base64.b64decode('').decode())"
          node --check shared.js
      - name: Commit patch
        run: |
          rm -f .github/workflows/codex-login-update-gate.yml
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git add shared.js .github/workflows/codex-login-update-gate.yml
          git commit -m "Show app update prompt only after login"
          git push
