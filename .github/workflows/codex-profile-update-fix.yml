name: Apply profile and update prompt fixes

on:
  push:
    paths:
      - .github/workflows/codex-profile-update-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch portal files
        run: |
          python -c "import base64; exec(base64.b64decode('').decode())"
          node --check shared.js
      - name: Commit patch
        run: |
          rm -f .github/workflows/codex-profile-update-fix.yml
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git add employee.html shared.js styles.css .github/workflows/codex-profile-update-fix.yml
          git commit -m "Fix app profile actions and update prompt gate"
          git push
