name: Apply Codex portal update

on:
  push:
    paths:
      - '.github/workflows/codex-apply-portal-update.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply profile and update button changes
        run: |
          python3 <<'PY'
          from pathlib import Path

          emp = Path('employee.html')
          s = emp.read_text(encoding='utf-8')
          s = s.replace('styles.css?v=mobile-app-row2-20260714', 'styles.css?v=profile-home-20260720')
          s = s.replace('href="employee.html#mark" class="topbar-brand"', 'href="employee.html#profile" class="topbar-brand"')
          if 'data-section="profile"' not in s:
              s = s.replace('<div class="nav-section">
      <div class="nav-label">Attendance</div>', '<div class="nav-section">
      <div class="nav-label">Employee</div>
      <div class="nav-item active" data-section="profile" onclick="showSection('profile', this)">
        <svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 10-16 0"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </div>
      <div class="nav-label">Attendance</div>')
          s = s.replace('<div class="nav-item active" data-section="mark" onclick="showSection('mark', this)">', '<div class="nav-item" data-section="mark" onclick="showSection('mark', this)">')
          if 'id="sec-profile"' not in s:
              marker = '  <!-- MAIN -->
  <main class="main-content">
    <!-- ══ MARK ATTENDANCE ══ -->
    <div class="page-section active" id="sec-mark">'
              repl = '  <!-- MAIN -->
  <main class="main-content">
    <!-- PROFILE -->
    <div class="page-section active" id="sec-profile">
      <div class="employee-profile-home">
        <div class="card-header"><div><div class="card-title">Profile</div><div class="card-sub">Your Citi Homes attendance identity</div></div></div>
        <div id="profile-photo-host"></div>
        <div class="profile-detail-grid">
          <div><span>Name</span><strong id="profile-name"></strong></div>
          <div><span>Employee Code</span><strong id="profile-code"></strong></div>
          <div><span>Department</span><strong id="profile-dept"></strong></div>
          <div><span>Designation</span><strong id="profile-desig"></strong></div>
        </div>
      </div>
    </div>

    <!-- ══ MARK ATTENDANCE ══ -->
    <div class="page-section" id="sec-mark">'
              s = s.replace(marker, repl)
          if "document.getElementById('profile-name')" not in s:
              s = s.replace("document.getElementById('sb-dept').textContent=EMP.dept;", "document.getElementById('sb-dept').textContent=EMP.dept;
document.getElementById('profile-name').textContent=EMP.name;
document.getElementById('profile-code').textContent=EMPCODE;
document.getElementById('profile-dept').textContent=EMP.dept;
document.getElementById('profile-desig').textContent=EMP.desig || '';")
          s = s.replace("initHashRouting(['mark','my-records','summary'], showSection, 'mark');", "initHashRouting(['profile','mark','my-records','summary'], showSection, 'profile');")
          emp.write_text(s, encoding='utf-8')

          shared = Path('shared.js')
          s = shared.read_text(encoding='utf-8')
          s = s.replace('const host = document.querySelector(".emp-profile, .profile-card, .employee-card, .glass-card, .card");', 'const host = document.querySelector("#profile-photo-host, .emp-profile, .profile-card, .employee-card, .glass-card, .card");')
          s = s.replace('host.insertBefore(panel, host.firstChild);', 'if (host.id === "profile-photo-host") host.appendChild(panel);
  else host.insertBefore(panel, host.firstChild);')
          if 'updateDownloadButtonsForAppUpdate(installed, latest);' not in s:
              s = s.replace('if (!latestCode || installedCode >= latestCode) return;
    showAppUpdateNotice(installed, latest);', 'if (!latestCode || installedCode >= latestCode) return;
    updateDownloadButtonsForAppUpdate(installed, latest);
    showAppUpdateNotice(installed, latest);')
          if 'function updateDownloadButtonsForAppUpdate' not in s:
              s = s.replace('
function ensureAppUpdateNoticeStyle() {', '
function updateDownloadButtonsForAppUpdate(installed, latest) {
  const downloadUrl = latest.downloadUrl || installed.downloadUrl || APP_DOWNLOAD_URL;
  document.querySelectorAll(".btn-download-app").forEach(btn => {
    btn.href = downloadUrl;
    btn.setAttribute("download", "CitiHomesAttendance.apk");
    btn.setAttribute("aria-label", "Update Citi Homes Attendance Android app");
    btn.textContent = "Update App";
    btn.classList.add("btn-app-update-available");
  });
}

function ensureAppUpdateNoticeStyle() {')
          shared.write_text(s, encoding='utf-8')

          css = Path('styles.css')
          s = css.read_text(encoding='utf-8')
          if '.employee-profile-home{' not in s:
              s += '
.employee-profile-home{max-width:720px;padding:18px;border-radius:24px;background:linear-gradient(135deg,rgba(255,255,255,.62),rgba(255,250,242,.28)),linear-gradient(135deg,rgba(255,235,180,.42),rgba(24,64,76,.12));border:1px solid rgba(255,255,255,.72);box-shadow:inset 0 1px 0 rgba(255,255,255,.86),0 24px 70px rgba(35,28,18,.16);backdrop-filter:blur(26px) saturate(1.35);-webkit-backdrop-filter:blur(26px) saturate(1.35)}
#profile-photo-host .employee-profile-photo{margin:18px 0}.profile-detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.profile-detail-grid>div{padding:12px;border-radius:16px;background:rgba(255,255,255,.38);border:1px solid rgba(255,255,255,.55);box-shadow:inset 0 1px 0 rgba(255,255,255,.62)}.profile-detail-grid span{display:block;margin-bottom:4px;color:rgba(20,31,35,.62);font-size:11px;font-weight:800;text-transform:uppercase}.profile-detail-grid strong{display:block;color:#15110d;font-size:14px;font-weight:850;overflow-wrap:anywhere}
@media(max-width:900px){.employee-profile-home{max-width:none}}@media(max-width:640px){.employee-profile-home{border-radius:18px;padding:14px}.profile-detail-grid{grid-template-columns:1fr}}
'
          if '.btn-download-app.btn-app-update-available' not in s:
              s += '
.btn-download-app.btn-app-update-available{background:linear-gradient(135deg,rgba(255,255,255,.96),rgba(255,255,255,.34)),linear-gradient(135deg,#ffe68c 0%,#d99a24 48%,#092c35 100%) !important;border-color:rgba(255,235,150,.96) !important;color:#120c05 !important;font-weight:950 !important;box-shadow:inset 0 1px 0 rgba(255,255,255,.96),0 18px 38px rgba(217,154,36,.35),0 0 0 1px rgba(255,245,205,.78) !important}
'
          css.write_text(s, encoding='utf-8')

          Path('.github/workflows/codex-apply-portal-update.yml').unlink(missing_ok=True)
          PY
      - name: Commit applied changes
        run: |
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          git add employee.html shared.js styles.css .github/workflows/codex-apply-portal-update.yml
          if git diff --cached --quiet; then
            echo "No changes needed."
          else
            git commit -m "Add profile page and update app button"
            git push
          fi
